<div style="display:flex;justify-content:center;padding:1.5rem 0;background:var(--color-background-secondary);border-radius:var(--border-radius-lg)">
<div style="width:320px;background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);overflow:hidden;font-size:14px;">

  <div style="padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-weight:500;font-size:15px;color:var(--color-text-primary)">Meet Attendance</div>
      <div style="font-size:12px;color:var(--color-text-secondary);margin-top:2px">Math 101 — 14 Mar 2025</div>
    </div>
    <div style="width:8px;height:8px;border-radius:50%;background:#3B6D11;margin-top:2px"></div>
  </div>

  <div style="padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);">
    <button onclick="captureClick()" id="capture-btn" style="width:100%;padding:9px;background:var(--color-background-info);color:var(--color-text-info);border:0.5px solid var(--color-border-info);border-radius:var(--border-radius-md);cursor:pointer;font-weight:500;font-size:13px;">
      Capture participants from Meet
    </button>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button onclick="selectAll()" style="flex:1;padding:6px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;color:var(--color-text-secondary);">Select all</button>
      <button onclick="deselectAll()" style="flex:1;padding:6px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;color:var(--color-text-secondary);">Deselect all</button>
    </div>
  </div>

  <div id="participant-list" style="max-height:220px;overflow-y:auto;padding:6px 0;">
    <div style="padding:24px 16px;text-align:center;color:var(--color-text-tertiary);font-size:13px;" id="empty-state">
      Click "Capture participants" to load the attendance list
    </div>
  </div>

  <div style="padding:10px 16px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)">
    <div id="summary" style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px;text-align:center;">No data yet</div>
    <div style="display:flex;gap:8px;">
      <button onclick="downloadCSV()" style="flex:1;padding:7px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;color:var(--color-text-primary);">Download CSV</button>
      <button onclick="sendToSheets()" style="flex:1;padding:7px;background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;font-weight:500;">Send to Sheets</button>
    </div>
  </div>
</div>
</div>

<script>
const DEMO_NAMES = ["Alice Mwangi","Brian Ochieng","Catherine Njeri","David Kamau","Esther Wanjiku","Faith Akinyi","George Mutua"];
let participants = [];
let checked = {};

function captureClick() {
  const btn = document.getElementById('capture-btn');
  btn.textContent = 'Capturing...';
  setTimeout(() => {
    participants = DEMO_NAMES;
    checked = {};
    participants.forEach(n => checked[n] = true);
    renderList();
    btn.textContent = 'Re-capture participants';
    updateSummary();
  }, 800);
}

function renderList() {
  const list = document.getElementById('participant-list');
  document.getElementById('empty-state')?.remove();
  list.innerHTML = participants.map(name => `
    <label style="display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary)">
      <input type="checkbox" ${checked[name]?'checked':''} onchange="toggle('${name}',this.checked)" style="width:15px;height:15px;accent-color:var(--color-text-info)">
      <span style="font-size:13px;color:var(--color-text-primary)">${name}</span>
      <span style="margin-left:auto;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--color-background-success);color:var(--color-text-success)">${checked[name]?'Present':'Absent'}</span>
    </label>
  `).join('');
}

function toggle(name, val) { checked[name]=val; updateSummary(); renderList(); }
function selectAll() { participants.forEach(n=>checked[n]=true); renderList(); updateSummary(); }
function deselectAll() { participants.forEach(n=>checked[n]=false); renderList(); updateSummary(); }
function updateSummary() {
  const present = participants.filter(n=>checked[n]).length;
  document.getElementById('summary').textContent = `${present} of ${participants.length} marked present`;
}
function downloadCSV() { if(!participants.length){alert('Capture participants first');return;} alert('CSV downloaded! (demo mode)'); }
function sendToSheets() { if(!participants.length){alert('Capture participants first');return;} alert('Sent to Sheets! (demo mode)'); }
</script>
